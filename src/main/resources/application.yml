server:
  port: 9090

spring:
  application:
    name: localagent-cloud
  datasource:
    # Production default: PostgreSQL (set DB_URL/DB_USER/DB_PASS on AWS for RDS)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/localagent_cloud}
    username: ${DB_USER:localagent}
    password: ${DB_PASS:localagent}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/localagent-cloud;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
