server:
  port: 9090

spring:
  application:
    name: localagent-cloud
  datasource:
    # Production default: PostgreSQL (set DB_URL/DB_USER/DB_PASS on AWS for RDS)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/localagent_cloud}
    username: ${DB_USER:localagent}
    password: ${DB_PASS:localagent}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true

# JWT Configuration
autopropel:
  jwt:
    secret: ${JWT_SECRET:autopropel-super-secret-key-change-this-in-production-min-256-bits-long}
    expiration-ms: 86400000  # 24 hours

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/localagent-cloud;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
