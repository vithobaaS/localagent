version: '3.8'

services:
  localagent-postgres:
    image: postgres:16
    container_name: localagent-postgres
    environment:
      POSTGRES_DB: localagent_cloud
      POSTGRES_USER: localagent
      POSTGRES_PASSWORD: localagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - localagent-network
    ports:
      - "5432:5432"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: localagent-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autopropel.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - localagent-network
    depends_on:
      - localagent-postgres
    restart: unless-stopped

  localagent-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localagent-cloud
    ports:
      - "80:9090"
    environment:
      DB_URL: jdbc:postgresql://localagent-postgres:5432/localagent_cloud
      DB_USER: localagent
      DB_PASS: localagent
      # AWS S3 Configuration for Screenshots
      AWS_S3_BUCKET: autopropel
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-YOUR_AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-YOUR_AWS_SECRET_KEY}
    depends_on:
      - localagent-postgres
    networks:
      - localagent-network
    restart: unless-stopped

networks:
  localagent-network:
    driver: bridge

volumes:
  pgdata:
